<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/static/css/signup.css">
</head>
<body>
    <div class="signup-container">
        <h2>Sign Up</h2>
        <form action="/signup" method="POST">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" name="username" placeholder="Username" required value="{{ form_data.username if form_data else '' }}">
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" name="email" placeholder="Email" required value="{{ form_data.email if form_data else '' }}">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" name="password1" placeholder="Password" required>
            </div>
            <div class="input-group">
                <label for="password">Confirm password</label>
                <input type="password" name="password2" placeholder="Confirm Password" required>
            </div>
            <button type="submit">Sign Up</button>
        </form>
        <p>Already have an account? <a href="/login">Login</a></p>

        {% if errors %}
            <div style="color: red; margin-top: 10px;">
                <ul>
                    {% for error in errors %}
                        <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            </div>
        {% endif %}

        {% if messages %}
            {% for message in messages %}
                <p style="color: green;">{{ message.text }}</p>
            {% endfor %}
        {% endif %}
    </div>
</body>
</html>
