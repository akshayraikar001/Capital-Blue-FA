<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ symbol }} Stock Price</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 1s ease-out;
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-900 overflow-x-hidden">
  <div class="max-w-3xl mx-auto py-10 sm:py-12 px-4 sm:px-6 text-center fade-in">
    <h2 class="text-2xl sm:text-3xl font-bold text-blue-600 mb-6">{{ symbol }} Stock Price</h2>

    {% if price %}
      <div class="bg-white rounded-xl shadow-md p-4 sm:p-6">
        <p class="text-lg sm:text-xl mb-2 break-words">Current price of <strong>{{ symbol }}</strong>:
          <span class="text-green-600 font-semibold">${{ price }}</span>
        </p>

        {% if dates_json != "[]" and prices_json != "[]" %}
          <div class="mt-6 overflow-x-auto">
            <canvas id="stockChart" class="min-h-[260px]"></canvas>
          </div>
        {% endif %}
      </div>
    {% elif error %}
      <p class="text-red-600 font-semibold text-base sm:text-lg">{{ error }}</p>
    {% endif %}

    <a href="/home_user/" class="mt-8 inline-block text-blue-600 underline text-base sm:text-lg">&larr; Back to Home</a>
  </div>

  {% if dates_json != "[]" and prices_json != "[]" %}
  <script>
    const ctx = document.getElementById('stockChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: {{ dates_json | safe }},
        datasets: [{
          label: '{{ symbol }} - Last 7 Days',
          data: {{ prices_json | safe }},
          borderColor: '#2563eb',
          backgroundColor: 'rgba(37, 99, 235, 0.2)',
          fill: true,
          tension: 0.4,
          pointRadius: 3
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            beginAtZero: false
          }
        }
      }
    });
  </script>
  {% endif %}
</body>
</html>
